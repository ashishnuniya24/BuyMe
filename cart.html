<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - BuyMe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

    <a class="navbar-brand fw-bold" href="index.html">BuyMe</a>

    <ul class="navbar-nav flex-row gap-4">
        <li class="nav-item">
            <a class="nav-link text-white" href="index.html">Home</a>
        </li>

        <li class="nav-item">
            <a class="nav-link text-white" href="products.html">Products</a>
        </li>

        <li class="nav-item">
            <a class="nav-link text-white" href="cart.html">Cart</a>
        </li>
    </ul>

    <form class="d-flex search-box mx-3">
        <input class="form-control" type="search" placeholder="Search accessories...">
    </form>

    <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-light">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
    </div>

</nav>

<div class="container my-5">

    <h2 class="mb-4 text-center fw-bold">Your Cart</h2>

    <div class="card p-3 mb-3 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h5 class="mb-1">Wireless Headphones</h5>
                <p class="mb-0">Price: $50</p>
            </div>

            <div class="d-flex align-items-center gap-2">
                <input type="number" value="1" min="1" class="form-control" style="width: 70px;">
                <button class="btn btn-danger btn-sm">Remove</button>
            </div>

        </div>
    </div>

    <div class="card p-3 mb-3 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h5 class="mb-1">Smart Watch</h5>
                <p class="mb-0">Price: $80</p>
            </div>

            <div class="d-flex align-items-center gap-2">
                <input type="number" value="1" min="1" class="form-control" style="width: 70px;">
                <button class="btn btn-danger btn-sm">Remove</button>
            </div>

        </div>
    </div>

    <div class="card p-4 shadow">

        <h4 class="fw-bold">Total: $130</h4>

        <button class="btn btn-success mt-3 w-100">
            Proceed to Checkout
        </button>

    </div>

</div>

<footer class="footer text-center">
    <p>© 2026 BuyMe. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
