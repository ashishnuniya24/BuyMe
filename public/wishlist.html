<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - BuyMe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark site-navbar sticky-top px-3 px-lg-4 py-3">
    <div class="container-fluid px-0">
        <a class="navbar-brand fw-bold" href="index.html">BuyMe</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="siteNav">
            <ul class="navbar-nav mx-auto align-items-lg-center gap-lg-3">
                <li class="nav-item"><a class="nav-link nav-pill" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link nav-pill" href="products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link nav-pill" href="cart.html">Cart <span id="cart-count" class="badge rounded-pill text-bg-light d-none">0</span></a></li>
                <li class="nav-item"><a class="nav-link active nav-pill" href="wishlist.html">Wishlist <span id="wishlist-count" class="badge rounded-pill text-bg-light d-none">0</span></a></li>
                <li class="nav-item"><a class="nav-link nav-pill" href="feedback.html">Feedback</a></li>
            </ul>

            <form class="site-search js-nav-search-form me-lg-3" autocomplete="off">
                <div class="input-group">
                    <input type="search" class="form-control js-nav-search-input" placeholder="Search products">
                    <button type="submit" class="btn btn-light text-primary">Search</button>
                </div>
            </form>

            <div class="d-flex gap-2 site-actions">
                <a href="login.html" class="btn btn-outline-light">Login</a>
                <a href="signup.html" class="btn btn-info text-dark">Sign Up</a>
            </div>
        </div>
    </div>
</nav>

<section class="container py-5">
    <h2 class="text-center mb-4 fw-bold">Your Wishlist</h2>
    <p id="wishlist-status" class="text-success text-center small mb-4 d-none"></p>
    <div id="wishlist-items" class="row g-4"></div>
</section>

<footer class="footer text-center py-3">
    © 2026 BuyMe. All rights reserved.
</footer>

<script src="cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function getFallbackProductImage(product) {
    const [primary, secondary] = product.colors || ["#0d6efd", "#8ec5ff"];
    const label = product.name.length > 16 ? `${product.name.slice(0, 13)}...` : product.name;
    const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="${product.name}">
            <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="${primary}" />
                    <stop offset="100%" stop-color="${secondary}" />
                </linearGradient>
            </defs>
            <rect width="640" height="480" rx="40" fill="url(#g)" />
            <rect x="110" y="110" width="420" height="210" rx="36" fill="rgba(255,255,255,0.18)" />
            <rect x="150" y="150" width="340" height="130" rx="28" fill="rgba(255,255,255,0.88)" />
            <text x="320" y="230" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="${primary}">${label}</text>
            <text x="320" y="380" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="white" letter-spacing="6">BUYME</text>
        </svg>`;

    return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

function setWishlistStatus(message) {
    const status = document.getElementById("wishlist-status");

    if (!status) {
        return;
    }

    if (!message) {
        status.textContent = "";
        status.classList.add("d-none");
        return;
    }

    status.textContent = message;
    status.classList.remove("d-none");
}

function removeFromWishlist(productName) {
    const wishlistItems = getWishlistItems();
    delete wishlistItems[productName];
    saveWishlistItems(wishlistItems);
    setWishlistStatus(`${productName} removed from wishlist.`);
    renderWishlist();
}

function moveWishlistItemToCart(productName) {
    const wishlistItems = getWishlistItems();
    const item = wishlistItems[productName];

    if (!item) {
        return;
    }

    addToCart(item.name, Number(item.price), item.image, item.colors, item.id);
    setWishlistStatus(`${item.name} added to cart.`);
}

function renderWishlist() {
    const wishlistItems = Object.values(getWishlistItems());
    const container = document.getElementById("wishlist-items");

    container.innerHTML = "";

    if (!wishlistItems.length) {
        container.innerHTML = `
            <div class="col-12">
                <div class="card p-4 text-center">
                    <h5 class="mb-2">Your wishlist is empty</h5>
                    <p class="mb-0 text-muted">Tap the heart button on a product to save it here.</p>
                </div>
            </div>
        `;
        return;
    }

    wishlistItems.forEach((item) => {
        const image = item.image || getFallbackProductImage(item);

        container.innerHTML += `
            <div class="col-sm-6 col-lg-4">
                <div class="card p-3 text-center h-100">
                    <div class="product-image-wrap">
                        <img class="product-image" src="${image}" alt="${item.name}" onerror="this.onerror=null;this.src='${getFallbackProductImage(item).replace(/'/g, "&#39;")}';">
                    </div>
                    <h5>${item.name}</h5>
                    <p>$${Number(item.price).toFixed(2)}</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" onclick='moveWishlistItemToCart(${JSON.stringify(item.name)})'>Add to Cart</button>
                        <button class="btn btn-outline-danger" onclick='removeFromWishlist(${JSON.stringify(item.name)})'>Remove</button>
                    </div>
                </div>
            </div>
        `;
    });
}

renderWishlist();
</script>

</body>
</html>
