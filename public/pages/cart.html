<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - BuyMe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

    <a class="navbar-brand fw-bold" href="index.html">BuyMe</a>

    <ul class="navbar-nav flex-row gap-4 align-items-center">
        <li><a class="nav-link text-white" href="index.html">Home</a></li>
        <li><a class="nav-link text-white" href="products.html">Products</a></li>
        <li><a class="nav-link text-white active" href="cart.html">Cart</a></li>
    </ul>

    <form class="d-flex mx-3 search-box">
        <input class="form-control" type="search" placeholder="Search accessories...">
    </form>

    <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-light">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
    </div>

</nav>

<div class="container my-5">

    <h2 class="fw-bold text-center mb-4">Your Cart</h2>

    <div id="cart-items" class="row g-3"></div>

    <h4 class="text-center mt-4" id="total"></h4>

    <div class="text-center mt-3">
        <button class="btn btn-success" onclick="placeOrder()">Place Order</button>
        <button class="btn btn-danger" onclick="clearCart()">Clear Cart</button>
    </div>

</div>

<footer class="footer text-center py-3">
    © 2026 BuyMe. All rights reserved.
</footer>

<script src="cart.js"></script>

<script>
function displayCart() {
    let cart = getCart();
    let container = document.getElementById("cart-items");
    let totalElement = document.getElementById("total");

    container.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = "<p class='text-center'>Your cart is empty</p>";
        totalElement.innerText = "";
        return;
    }

    cart.forEach((item, index) => {
        total += item.price * item.quantity;

        container.innerHTML += `
            <div class="col-md-4">
                <div class="card p-3 text-center h-100">
                    <h5>${item.name}</h5>
                    <p>$${item.price}</p>

                    <div class="d-flex justify-content-center align-items-center gap-2">
                        <button class="btn btn-danger btn-sm"
                            onclick="decreaseQuantity(${index})">-</button>

                        <span>${item.quantity}</span>

                        <button class="btn btn-success btn-sm"
                            onclick="increaseQuantity(${index})">+</button>
                    </div>
                </div>
            </div>
        `;
    });

    totalElement.innerText = "Total: $" + total.toFixed(2);
}

async function placeOrder() {
    const cart = getCart();

    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    const user_id = 1;

    try {
        const response = await fetch("http://localhost:3000/api/orders", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user_id,
                items: cart
            })
        });

        const data = await response.json();

        alert("Order placed successfully");

        localStorage.removeItem("cart");
        displayCart();

    } catch (err) {
        alert("Error placing order");
    }
}

displayCart();
</script>

</body>
</html>
