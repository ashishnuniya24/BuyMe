<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - BuyMe</title>
    <meta http-equiv="refresh" content="0; url=../products.html">

    <script>
        window.location.replace("../products.html");
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

    <a class="navbar-brand fw-bold" href="index.html">BuyMe</a>

    <ul class="navbar-nav flex-row gap-4 align-items-center">
        <li><a class="nav-link text-white" href="index.html">Home</a></li>
        <li><a class="nav-link text-white active" href="products.html">Products</a></li>
        <li><a class="nav-link text-white" href="cart.html">Cart</a></li>
    </ul>

    <form class="d-flex mx-3 search-box">
        <input 
            id="searchInput"
            class="form-control" 
            type="search" 
            placeholder="Search accessories..."
            onkeyup="filterProducts()"
        >
    </form>

    <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-light">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
    </div>

</nav>

<section class="container py-5">

    <h2 class="text-center mb-4 fw-bold">Our Products</h2>

    <div class="row g-4" id="product-list"></div>

</section>

<footer class="footer text-center py-3">
    © 2026 BuyMe. All rights reserved.
</footer>

<script src="cart.js"></script>

<script>

const products = [
    { name: "Headphones", price: 59.99 },
    { name: "Smart Watch", price: 99.99 },
    { name: "Mouse", price: 29.99 },
    { name: "Keyboard", price: 79.99 },
    { name: "USB-C Cable", price: 9.99 },
    { name: "Laptop Stand", price: 24.99 },
    { name: "Speaker", price: 39.99 },
    { name: "Phone Holder", price: 14.99 },
    { name: "Webcam", price: 49.99 },
    { name: "External SSD", price: 119.99 },
    { name: "Power Bank", price: 34.99 },
    { name: "Monitor", price: 199.99 },
    { name: "Tablet", price: 249.99 },
    { name: "Phone Case", price: 12.99 },
    { name: "Charger", price: 19.99 },
    { name: "Earbuds", price: 149.99 }
];

function renderProducts(list) {
    const container = document.getElementById("product-list");
    container.innerHTML = "";

    list.forEach(product => {
        container.innerHTML += `
            <div class="col-md-3">
                <div class="card p-3 text-center h-100">
                    <h5>${product.name}</h5>
                    <p>$${product.price}</p>
                    <button class="btn btn-primary"
                        onclick="addToCart('${product.name}', ${product.price})">
                        Add to Cart
                    </button>
                </div>
            </div>
        `;
    });
}

function filterProducts() {
    const value = document.getElementById("searchInput").value.toLowerCase();

    const filtered = products.filter(p =>
        p.name.toLowerCase().includes(value)
    );

    renderProducts(filtered);
}

function loadProducts() {
    renderProducts(products);
}

loadProducts();

</script>

</body>
</html>
