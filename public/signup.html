<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BuyMe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark site-navbar sticky-top px-3 px-lg-4 py-3">
    <div class="container-fluid px-0">
        <a class="navbar-brand fw-bold" href="index.html">BuyMe</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="siteNav">
            <ul class="navbar-nav mx-auto align-items-lg-center gap-lg-3">
                <li class="nav-item"><a class="nav-link nav-pill" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link nav-pill" href="products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link nav-pill" href="cart.html">Cart <span id="cart-count" class="badge rounded-pill text-bg-light d-none">0</span></a></li>
                <li class="nav-item"><a class="nav-link nav-pill" href="feedback.html">Feedback</a></li>
            </ul>

            <form class="site-search js-nav-search-form me-lg-3" autocomplete="off">
                <div class="input-group">
                    <input type="search" class="form-control js-nav-search-input" placeholder="Search products">
                    <button type="submit" class="btn btn-light text-primary">Search</button>
                </div>
            </form>

            <div class="d-flex gap-2 site-actions">
                <a href="login.html" class="btn btn-outline-light">Login</a>
                <a href="signup.html" class="btn btn-light">Sign Up</a>
            </div>
        </div>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center auth-page">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Create Account</h3>

        <form id="signupForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign Up</button>

            <p class="text-center mt-3">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </form>
    </div>
</div>

<footer class="footer text-center py-3">
    © 2026 BuyMe. All rights reserved.
</footer>

<script src="cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const inputs = document.querySelectorAll("#signupForm input");
    const name = inputs[0].value;
    const email = inputs[1].value;
    const password = inputs[2].value;

    try {
        const res = await fetch("http://localhost:3000/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.ok) {
            alert("Signup successful 🚀");
            window.location.href = "login.html";
        } else {
            alert(data.error || "Signup failed");
        }
    } catch (err) {
        alert("Server error");
        console.error(err);
    }
});
</script>

</body>
</html>
