<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - BuyMe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

    <a class="navbar-brand fw-bold" href="index.html">BuyMe</a>

    <ul class="navbar-nav flex-row gap-4 align-items-center">
        <li><a class="nav-link text-white" href="index.html">Home</a></li>
        <li><a class="nav-link text-white active" href="products.html">Products</a></li>
        <li><a class="nav-link text-white" href="cart.html">Cart</a></li>
    </ul>

    <form class="d-flex mx-3 search-box">
        <input class="form-control" type="search" placeholder="Search accessories...">
    </form>

    <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-light">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
    </div>

</nav>

<section class="container py-5">

    <h2 class="text-center mb-4 fw-bold">Our Products</h2>

    <div class="row g-4" id="product-list"></div>

</section>

<footer class="footer text-center py-3">
    © 2026 BuyMe. All rights reserved.
</footer>

<script src="cart.js"></script>

<script>
async function loadProducts() {
    try {
        const res = await fetch("http://localhost:3000/api/products");
        const products = await res.json();

        const container = document.getElementById("product-list");
        container.innerHTML = "";

        products.forEach(product => {
            container.innerHTML += `
                <div class="col-md-3">
                    <div class="card p-3 text-center h-100">
                        <h5>${product.name}</h5>
                        <p>$${product.price}</p>
                        <button class="btn btn-primary"
                            onclick="addToCart('${product.name}', ${product.price})">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `;
        });

    } catch (err) {
        console.error("Error loading products:", err);
    }
}

loadProducts();
</script>

</body>
</html>
